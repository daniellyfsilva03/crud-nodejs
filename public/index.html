<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <title>Cadastro de Usuários</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="container mt-4">
 
<h2>Cadastro de Usuários</h2>
 
<form id="formUsuario" class="row g-3 mb-4">
    <input type="hidden" id="id">
 
    <div class="col-md-4">
        <label>Nome</label>
        <input type="text" id="nome" class="form-control" required>
    </div>
 
    <div class="col-md-4">
        <label>Email</label>
        <input type="email" id="email" class="form-control" required>
    </div>
 
    <div class="col-md-4">
        <label>Telefone</label>
        <input type="text" id="telefone" class="form-control">
    </div>
 
    <div class="col-12">
        <button class="btn btn-primary">Salvar</button>
        <button type="button" class="btn btn-secondary" onclick="limparFormulario()">Limpar</button>
    </div>
</form>
 
<table class="table table-bordered">
    <thead class="table-dark">
        <tr>
            <th>Nome</th>
            <th>Email</th>
            <th>Telefone</th>
            <th width="180">Ações</th>
        </tr>
    </thead>
    <tbody id="listaUsuarios"></tbody>
</table>
 
<script>
const api = 'http://localhost:3000/usuarios';
 
// LISTAR
function carregarUsuarios() {
    fetch(api)
        .then(res => res.json())
        .then(data => {
            listaUsuarios.innerHTML = '';
            data.forEach(u => {
                listaUsuarios.innerHTML += `
                <tr>
                    <td>${u.nome}</td>
                    <td>${u.email}</td>
                    <td>${u.telefone || ''}</td>
                    <td>
                        <button class="btn btn-warning btn-sm" onclick="editar(${u.id}, '${u.nome}', '${u.email}', '${u.telefone || ''}')">Editar</button>
                        <button class="btn btn-danger btn-sm" onclick="excluir(${u.id})">Excluir</button>
                    </td>
                </tr>`;
            });
        });
}
 
// SALVAR / ATUALIZAR
formUsuario.addEventListener('submit', e => {
    e.preventDefault();
 
    const id = document.getElementById('id').value;
    const dados = {
        nome: nome.value,
        email: email.value,
        telefone: telefone.value
    };
 
    const metodo = id ? 'PUT' : 'POST';
    const url = id ? `${api}/${id}` : api;
 
    fetch(url, {
        method: metodo,
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify(dados)
    }).then(() => {
        limparFormulario();
        carregarUsuarios();
    });
});
 
// EDITAR
function editar(id, nome, email, telefone) {
    document.getElementById('id').value = id;
    document.getElementById('nome').value = nome;
    document.getElementById('email').value = email;
    document.getElementById('telefone').value = telefone;
}
 
// EXCLUIR
function excluir(id) {
    fetch(`${api}/${id}`, { method: 'DELETE' })
        .then(() => carregarUsuarios());
}
 
// LIMPAR FORMULÁRIO
function limparFormulario() {
    formUsuario.reset();
    document.getElementById('id').value = '';
}
 
carregarUsuarios();
</script>
 
</body>
</html>
